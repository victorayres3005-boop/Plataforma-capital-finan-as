name: Quality (TS + Tests + Lint)

# Gate de qualidade — roda em todo PR e push pra master.
# Bloqueia merge se TypeScript ou testes Vitest falharem.
# Lint roda como warning (não bloqueia) — há ~99 erros pré-existentes que
# precisam de cleanup gradual; remover continue-on-error quando chegar a 0.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript + Vitest + ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Vitest unit tests
        run: npm test

      - name: ESLint (warning — não bloqueia merge)
        run: npm run lint
        continue-on-error: true
