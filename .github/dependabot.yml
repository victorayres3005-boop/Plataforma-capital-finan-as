version: 2
updates:
  # Dependências npm (Next.js, Supabase, Gemini SDK indireto, etc.)
  - package-ecosystem: npm
    directory: /
    target-branch: master
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions (actions/checkout, actions/setup-node, etc.)
  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: monthly
      day: monday
      time: "03:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
